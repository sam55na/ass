<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>البرج الذهبي</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        
        body {
            background: linear-gradient(180deg, #0a2f2a 0%, #061a18 100%);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        
        .game-fullscreen {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .game-header {
            background: rgba(0,0,0,0.9);
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #FFD700;
            flex-shrink: 0;
        }
        
        .close-btn {
            background: rgba(0,0,0,0.6);
            border: 1px solid #FFD700;
            color: #FFD700;
            padding: 6px 16px;
            border-radius: 40px;
            cursor: pointer;
        }
        
        .canvas-area {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: radial-gradient(circle at 30% 20%, #4a90c4, #1a4a6a);
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        
        .bottom-bar {
            background: rgba(0,0,0,0.95);
            border-top: 2px solid #FFD700;
            padding: 16px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            flex-shrink: 0;
        }
        
        .balance-card {
            background: #000;
            padding: 10px 24px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #FFD700;
            font-weight: bold;
            border: 1px solid #FFD700;
        }
        
        .balance-card span { font-size: 1.6rem; font-weight: 900; }
        
        .bet-card {
            background: #FFD700;
            padding: 10px 24px;
            border-radius: 60px;
            color: #000;
            font-weight: bold;
        }
        
        .multiplier-card {
            background: #000;
            padding: 10px 20px;
            border-radius: 60px;
            color: #FFD700;
            border: 1px solid #FFD700;
            font-weight: bold;
        }
        
        .action-buttons {
            display: flex;
            gap: 12px;
        }
        
        button {
            border: none;
            font-weight: bold;
            font-size: 1.1rem;
            padding: 10px 28px;
            border-radius: 60px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }
        
        button:active { transform: scale(0.97); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .btn-start {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            box-shadow: 0 4px 0 #1f8f4b;
        }
        
        .btn-drop {
            background: linear-gradient(135deg, #FFD700, #B8860B);
            color: #000;
            box-shadow: 0 4px 0 #8B6914;
        }
        
        .btn-cashout {
            background: linear-gradient(135deg, #e67e22, #b45f1b);
            color: white;
            box-shadow: 0 4px 0 #8B4513;
        }
        
        .status-bar {
            background: #000000dd;
            text-align: center;
            padding: 10px;
            font-size: 13px;
            color: #FFD700;
            flex-shrink: 0;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 16px;
            right: 16px;
            background: #1c7a1c;
            padding: 12px;
            border-radius: 50px;
            text-align: center;
            z-index: 2000;
            animation: slideUp 0.3s ease;
        }
        
        .toast.error { background: #b91c1c; }
        
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
<div class="game-fullscreen">
    <div class="game-header">
        <button class="close-btn" id="closeGameBtn">✖️ إغلاق</button>
        <h2 style="color:#FFD700;">🏗️ البرج الذهبي</h2>
        <div style="width: 60px;"></div>
    </div>
    <div class="canvas-area">
        <canvas id="gameCanvas"></canvas>
    </div>
    <div class="bottom-bar">
        <div class="balance-card">💰 <span id="balanceDisplay">0</span></div>
        <div class="bet-card">🎲 الرهان: 2000</div>
        <div class="multiplier-card" id="multiplierDisplay">🏆 0.00x</div>
        <div class="action-buttons">
            <button id="startBtn" class="btn-start">🚀 بدء جولة</button>
            <button id="dropBtn" class="btn-drop" style="display: none;">⬇️ إفلات</button>
            <button id="cashoutBtn" class="btn-cashout" style="display: none;">💰 جمع</button>
        </div>
    </div>
    <div class="status-bar">
        <span id="gameStatusMsg">✨ اضغط "بدء جولة" للعب (الرهان 2000) ✨</span>
    </div>
</div>

<script>
(function(){
    // إعدادات اللعبة
    const MULTIPLIERS = { 1: 0.5, 2: 0.7, 3: 0.9, 4: 1.1, 5: 1.3, 6: 1.5, 7: 1.7, 8: 3.0, 9: 5.0, 10: 7.0, 11: 9.0, 12: 11.0, 13: 15.0 };
    const MAX_FLOOR = 13;
    const BET_AMOUNT = 2000;
    const API_URL = "https://ass-yygm.onrender.com";
    
    // حالة اللعبة
    let gameBalance = 0;
    let currentFloor = 0;
    let isGameActive = false;
    let currentMultiplier = 0;
    let pendingProfit = 0;
    let gameId = null;
    let currentUser = null;
    let authToken = null;
    let isProcessing = false;
    
    // عناصر الرسم
    const canvas = document.getElementById('gameCanvas');
    let ctx = canvas.getContext('2d');
    let cameraY = 0;
    let builtFloors = [];
    let groundY, groundX;
    
    // الكتلة المتأرجحة
    let swinging = {
        x: 0, y: 0, w: 48, h: 28,
        angle: 0, speed: 0.048, direction: 1, maxAngle: 0.85,
        pivotX: 0, pivotY: -30, ropeLength: 210
    };
    
    let isFalling = false;
    let fallPosX = 0, fallPosY = 0;
    let fallFloorNum = 0;
    let waitingForLanding = false;
    
    // واجهة المستخدم
    const startBtn = document.getElementById('startBtn');
    const dropBtn = document.getElementById('dropBtn');
    const cashoutBtn = document.getElementById('cashoutBtn');
    const balanceSpan = document.getElementById('balanceDisplay');
    const multiplierSpan = document.getElementById('multiplierDisplay');
    const statusSpan = document.getElementById('gameStatusMsg');
    
    // ============= دوال الخادم =============
    async function getAuthToken() {
        return new Promise((resolve) => {
            if (authToken) { resolve(authToken); return; }
            const checkFirebase = setInterval(() => {
                if (window.firebaseAuthToken) {
                    clearInterval(checkFirebase);
                    authToken = window.firebaseAuthToken;
                    resolve(authToken);
                }
            }, 100);
            setTimeout(() => { clearInterval(checkFirebase); resolve(null); }, 3000);
        });
    }
    
    async function apiCall(endpoint, options = {}) {
        const token = await getAuthToken();
        try {
            const response = await fetch(`${API_URL}${endpoint}`, {
                ...options,
                headers: { 'Content-Type': 'application/json', ...(token && { 'Authorization': `Bearer ${token}` }) }
            });
            if (response.status === 401) {
                showMessage('انتهت الجلسة، أعد تسجيل الدخول', true);
                return null;
            }
            return response;
        } catch (error) { 
            console.error('API error:', error); 
            showMessage('خطأ في الاتصال بالخادم', true);
            return null; 
        }
    }
    
    function showMessage(msg, isErr = false) {
        const toast = document.createElement('div');
        toast.className = 'toast' + (isErr ? ' error' : '');
        toast.innerHTML = isErr ? `⚠️ ${msg}` : `✅ ${msg}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }
    
    // جلب الرصيد من الخادم
    async function fetchBalance() {
        const res = await apiCall('/api/user/profile');
        if (res?.ok) {
            const data = await res.json();
            if (data.success) {
                gameBalance = data.user.balance || 0;
                balanceSpan.innerText = gameBalance.toLocaleString();
            }
        }
    }
    
    // بدء جولة جديدة (يخصم 2000)
    async function startNewRound() {
        if (isProcessing) return;
        if (gameBalance < BET_AMOUNT) {
            showMessage(`رصيدك غير كافٍ! تحتاج ${BET_AMOUNT} SYP`, true);
            return;
        }
        
        isProcessing = true;
        statusSpan.innerHTML = "🔄 جاري بدء الجولة وخصم الرهان...";
        
        try {
            const res = await apiCall('/api/game/golden-tower/start', { method: 'POST' });
            if (res?.ok) {
                const data = await res.json();
                if (data.success) {
                    gameId = data.gameId;
                    currentFloor = 0;
                    isGameActive = true;
                    pendingProfit = 0;
                    builtFloors = [];
                    cameraY = 0;
                    
                    // تحديث الرصيد
                    gameBalance = data.gameState.balance;
                    balanceSpan.innerText = gameBalance.toLocaleString();
                    
                    // تغيير واجهة الأزرار
                    startBtn.style.display = 'none';
                    dropBtn.style.display = 'block';
                    cashoutBtn.style.display = 'block';
                    
                    // إعادة تعيين الكتلة المتأرجحة
                    resetSwingPosition();
                    
                    statusSpan.innerHTML = "🎉 بدأت الجولة! اضغط "إفلات" لوضع الطابق الأول 🎉";
                    showMessage(`تم خصم ${BET_AMOUNT} SYP`, false);
                    
                    // إعلام النافذة الأم بتحديث الرصيد
                    window.parent.postMessage({ type: 'UPDATE_BALANCE' }, '*');
                } else {
                    showMessage(data.message || 'فشل بدء الجولة', true);
                    statusSpan.innerHTML = "❌ فشل بدء الجولة، حاول مرة أخرى";
                }
            }
        } catch(e) { console.error(e); showMessage('حدث خطأ', true); }
        finally { isProcessing = false; }
    }
    
    // إفلات الطابق
    async function dropFloor() {
        if (!isGameActive || isProcessing || waitingForLanding) return;
        if (currentFloor >= MAX_FLOOR) {
            statusSpan.innerHTML = "🏆 اكتمل البرج! اضغط "جمع" لسحب أرباحك";
            return;
        }
        
        isProcessing = true;
        waitingForLanding = true;
        statusSpan.innerHTML = `💨 الطابق ${currentFloor + 1} يسقط... 💨`;
        
        try {
            const res = await apiCall('/api/game/golden-tower/drop', {
                method: 'POST',
                body: JSON.stringify({ gameId, angle: swinging.angle, positionX: swinging.x })
            });
            
            if (res?.ok) {
                const data = await res.json();
                if (data.success) {
                    currentFloor = data.gameState.currentFloor;
                    pendingProfit = data.gameState.pendingProfit;
                    builtFloors = data.gameState.builtFloors || [];
                    cameraY = data.gameState.cameraY || 0;
                    
                    if (data.floorPlaced) {
                        statusSpan.innerHTML = `✅ الطابق ${currentFloor} ثبُت! المضاعف ${data.multiplier.toFixed(2)}x | الأرباح: ${Math.floor(pendingProfit)}`;
                        addShakeEffect();
                    }
                    
                    updateMultiplierDisplay();
                    
                    if (currentFloor >= MAX_FLOOR) {
                        statusSpan.innerHTML = "🏆 أكملت البرج! اضغط "جمع" لسحب أرباحك 🏆";
                    }
                } else if (data.gameOver) {
                    // خسارة
                    isGameActive = false;
                    startBtn.style.display = 'block';
                    dropBtn.style.display = 'none';
                    cashoutBtn.style.display = 'none';
                    statusSpan.innerHTML = data.message;
                    showMessage(data.message, true);
                    
                    // تحديث الرصيد من الخادم
                    await fetchBalance();
                    window.parent.postMessage({ type: 'UPDATE_BALANCE' }, '*');
                }
            }
        } catch(e) { console.error(e); }
        finally {
            isProcessing = false;
            waitingForLanding = false;
        }
    }
    
    // جمع الأرباح
    async function cashout() {
        if (!isGameActive || isProcessing) return;
        if (pendingProfit <= 0) {
            statusSpan.innerHTML = "⚠️ لا توجد أرباح لجمعها! ابنِ طابقاً أولاً";
            return;
        }
        
        isProcessing = true;
        statusSpan.innerHTML = "💰 جاري جمع الأرباح...";
        
        try {
            const res = await apiCall('/api/game/golden-tower/cashout', { method: 'POST', body: JSON.stringify({ gameId }) });
            if (res?.ok) {
                const data = await res.json();
                if (data.success) {
                    gameBalance = data.gameState.balance;
                    balanceSpan.innerText = gameBalance.toLocaleString();
                    
                    isGameActive = false;
                    builtFloors = [];
                    initGround();
                    resetSwingPosition();
                    
                    startBtn.style.display = 'block';
                    dropBtn.style.display = 'none';
                    cashoutBtn.style.display = 'none';
                    
                    statusSpan.innerHTML = data.message;
                    showMessage(data.message, false);
                    window.parent.postMessage({ type: 'UPDATE_BALANCE' }, '*');
                }
            }
        } catch(e) { console.error(e); }
        finally { isProcessing = false; }
    }
    
    function updateMultiplierDisplay() {
        let multiplier = currentFloor > 0 ? (MULTIPLIERS[currentFloor] || 0) : 0;
        if (isGameActive && currentFloor < MAX_FLOOR) {
            let nextMulti = MULTIPLIERS[currentFloor + 1] || 0;
            multiplierSpan.innerHTML = `🎯 طابق ${currentFloor + 1}: ${nextMulti.toFixed(2)}x`;
        } else if (currentFloor >= MAX_FLOOR) {
            multiplierSpan.innerHTML = `🏆 اكتمل! ${MULTIPLIERS[MAX_FLOOR].toFixed(2)}x`;
        } else {
            multiplierSpan.innerHTML = `🏆 مضاعف: ---`;
        }
    }
    
    // ============= دوال الرسم =============
    function initGround() {
        groundY = canvas.height - 55;
        groundX = canvas.width/2 - 105;
        builtFloors = [{ x: groundX + 105, y: groundY + 14, w: 210, h: 28, floorNumber: 0, isGround: true }];
    }
    
    function resetSwingPosition() {
        swinging.pivotX = canvas.width / 2;
        swinging.pivotY = -30;
        swinging.angle = 0;
        updateSwingPosition();
    }
    
    function updateSwingPosition() {
        let offsetX = Math.sin(swinging.angle) * swinging.ropeLength;
        swinging.x = swinging.pivotX + offsetX;
        swinging.y = swinging.pivotY + swinging.ropeLength * 0.75;
    }
    
    function updateSwing() {
        if (isGameActive && !waitingForLanding && !isFalling && currentFloor < MAX_FLOOR) {
            swinging.angle += swinging.direction * swinging.speed;
            if (swinging.angle > swinging.maxAngle) {
                swinging.angle = swinging.maxAngle;
                swinging.direction = -1;
            } else if (swinging.angle < -swinging.maxAngle) {
                swinging.angle = -swinging.maxAngle;
                swinging.direction = 1;
            }
            updateSwingPosition();
        }
    }
    
    let clouds = [];
    function initClouds() {
        for(let i = 0; i < 6; i++) {
            clouds.push({ x: Math.random() * 800, y: 40 + Math.random() * 120, w: 60 + Math.random() * 70, h: 30 + Math.random() * 25, speed: 0.05 + Math.random() * 0.12 });
        }
    }
    
    function drawSky() {
        const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        grad.addColorStop(0, "#4a90c4");
        grad.addColorStop(1, "#a8d4f0");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        for(let cloud of clouds) {
            ctx.globalAlpha = 0.8;
            ctx.fillStyle = "rgba(255,255,250,0.9)";
            ctx.beginPath();
            ctx.ellipse(cloud.x, cloud.y, cloud.w/2, cloud.h/2, 0, 0, Math.PI*2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
    }
    
    function drawFancyFloor(x, y, w, h, floorNum, isGround) {
        ctx.fillStyle = isGround ? "#4a3a1a" : ["#c9a84c","#d4af37","#FFD700","#e6c85c"][(floorNum-1) % 4];
        ctx.fillRect(x - w/2, y - h/2, w, h);
        ctx.fillStyle = "#FFD700";
        ctx.fillRect(x - w/2 + 3, y - h/2, w - 6, 3);
        if(!isGround && floorNum > 0) {
            ctx.fillStyle = "#000";
            ctx.fillRect(x - 12, y - 3, 10, 12);
            ctx.fillRect(x + 2, y - 3, 10, 12);
            ctx.fillStyle = "#FFD700";
            ctx.font = "bold 12px sans-serif";
            ctx.fillText(`${floorNum}`, x - 7, y + 6);
        }
    }
    
    let shakeIntensity = 0;
    let shakeDuration = 0;
    function addShakeEffect() { shakeIntensity = 7; shakeDuration = 150; }
    function updateShake() {
        if(shakeDuration > 0) { shakeDuration -= 16; if(shakeDuration <= 0) shakeIntensity = 0; }
        else { shakeIntensity = 0; }
    }
    function getShakeOffset() {
        if(shakeIntensity <= 0) return { x: 0, y: 0 };
        return { x: (Math.random() - 0.5) * shakeIntensity, y: (Math.random() - 0.5) * shakeIntensity * 0.5 };
    }
    
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawSky();
        let shake = getShakeOffset();
        ctx.save();
        ctx.translate(shake.x, shake.y - cameraY);
        
        for(let f of builtFloors) {
            drawFancyFloor(f.x, f.y, f.w, f.h, f.floorNumber, f.isGround);
        }
        
        if (isGameActive && !waitingForLanding && currentFloor < MAX_FLOOR) {
            ctx.beginPath();
            ctx.moveTo(swinging.pivotX, swinging.pivotY);
            ctx.lineTo(swinging.x, swinging.y - 10);
            ctx.strokeStyle = "#FFD700";
            ctx.lineWidth = 2;
            ctx.stroke();
            drawFancyFloor(swinging.x, swinging.y, 48, 28, currentFloor + 1, false);
        }
        
        if (isGameActive && pendingProfit > 0) {
            ctx.font = "bold 22px sans-serif";
            ctx.fillStyle = "#FFD700";
            ctx.fillText(`💰 ${Math.floor(pendingProfit)}`, canvas.width-110, 45 + cameraY);
        }
        
        ctx.restore();
    }
    
    function resizeCanvas() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
        initGround();
        resetSwingPosition();
        initClouds();
    }
    
    function gameLoop() {
        updateShake();
        updateSwing();
        draw();
        requestAnimationFrame(gameLoop);
    }
    
    // استعادة جولة موجودة
    async function resumeGame() {
        const res = await apiCall('/api/game/golden-tower/resume');
        if (res?.ok) {
            const data = await res.json();
            if (data.success && data.hasActiveGame) {
                currentFloor = data.gameState.currentFloor;
                pendingProfit = data.gameState.pendingProfit;
                builtFloors = data.gameState.builtFloors || [];
                cameraY = data.gameState.cameraY || 0;
                gameId = data.gameId;
                isGameActive = true;
                
                startBtn.style.display = 'none';
                dropBtn.style.display = 'block';
                cashoutBtn.style.display = 'block';
                
                updateMultiplierDisplay();
                statusSpan.innerHTML = "🔄 تم استعادة الجولة السابقة!";
                return true;
            }
        }
        return false;
    }
    
    // التهيئة
    async function init() {
        await fetchBalance();
        const resumed = await resumeGame();
        if (!resumed) {
            initGround();
            resetSwingPosition();
        }
        resizeCanvas();
        gameLoop();
    }
    
    // ربط الأزرار
    startBtn.onclick = () => startNewRound();
    dropBtn.onclick = () => dropFloor();
    cashoutBtn.onclick = () => cashout();
    document.getElementById('closeGameBtn').onclick = () => window.parent.postMessage({ type: 'CLOSE_GAME' }, '*');
    
    window.addEventListener('resize', resizeCanvas);
    
    // استلام بيانات المستخدم
    window.addEventListener('message', async (event) => {
        if (event.data && event.data.type === 'USER_DATA') {
            currentUser = event.data.user;
            if (event.data.token) {
                window.firebaseAuthToken = event.data.token;
                authToken = event.data.token;
            }
            await init();
        }
    });
    
    window.parent.postMessage({ type: 'GAME_READY', game: 'golden_tower' }, '*');
})();
</script>
</body>
</html>
