<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOOMB - منصة الألعاب</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a0000);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        /* الشريط العلوي */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a1a1a;
            padding: 12px 20px;
            border-radius: 60px;
            margin-bottom: 20px;
            border: 1px solid #ff0000;
            box-shadow: 0 0 15px rgba(255,0,0,0.3);
        }
        .account-btn {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 10px red;
        }
        .account-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px red; }
        .balance-box {
            background: linear-gradient(135deg, #1a0000, #000);
            padding: 10px 20px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #ff0000;
        }
        .balance-box .label { font-size: 12px; color: #ff6666; }
        .balance-box .amount { font-size: 28px; font-weight: bold; color: #ff0000; }
        /* أزرار */
        .action-buttons {
            display: flex;
            gap: 15px;
            margin: 20px 0;
        }
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #ff0000, #cc0000);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(255,0,0,0.5); }
        .btn-secondary {
            background: #333;
            color: #ff0000;
            border: 1px solid #ff0000;
        }
        /* قسم اللعب */
        .play-area {
            text-align: center;
            margin: 40px 0;
        }
        .game-icon {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #ff0000, #990000);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 30px red;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); box-shadow: 0 0 50px red; }
        }
        .game-icon:hover { transform: scale(1.1); }
        .play-btn {
            background: linear-gradient(135deg, #ff0000, #cc0000);
            padding: 15px 50px;
            border: none;
            border-radius: 50px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .play-btn:hover { transform: scale(1.05); box-shadow: 0 5px 30px red; }
        /* الشريط السفلي */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            background: #1a1a1a;
            padding: 12px;
            border-radius: 60px;
            margin-top: 30px;
            border: 1px solid rgba(255,0,0,0.3);
        }
        .nav-item {
            text-align: center;
            cursor: pointer;
            padding: 8px;
            border-radius: 40px;
            transition: 0.3s;
            color: #888;
        }
        .nav-item:hover { background: rgba(255,0,0,0.2); color: #ff0000; }
        .nav-icon { font-size: 24px; display: block; }
        .nav-label { font-size: 11px; }
        /* النوافذ المنبثقة */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-content {
            background: #1a1a1a;
            border-radius: 20px;
            max-width: 400px;
            width: 100%;
            padding: 25px;
            border: 1px solid #ff0000;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            color: #ff0000;
            border-bottom: 1px solid rgba(255,0,0,0.3);
            padding-bottom: 10px;
        }
        .close { cursor: pointer; font-size: 24px; }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,0,0,0.2);
        }
        .request-item {
            background: #0d0d0d;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 10px;
            border-right: 3px solid #ff0000;
        }
        .toast {
            position: fixed;
            bottom: 100px;
            left: 20px;
            right: 20px;
            background: #ff0000;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            z-index: 1001;
            animation: slideUp 0.3s;
        }
        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .google-btn {
            background: linear-gradient(135deg, #ff0000, #cc0000);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
        }
        .hidden { display: none; }
        .referral-code {
            background: #0d0d0d;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-family: monospace;
            font-size: 18px;
            margin-top: 15px;
            border: 1px solid #ff0000;
        }
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #ff0000;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading" class="loading"><div class="spinner"></div></div>
    
    <div id="app" class="container hidden">
        <!-- الشاشة الرئيسية -->
        <div id="mainView">
            <div class="top-bar">
                <div class="account-btn" id="accountBtn">👤</div>
                <div class="balance-box">
                    <div class="label">رصيد NSP</div>
                    <div class="amount" id="balanceAmount">0</div>
                </div>
            </div>
            
            <div class="action-buttons">
                <button class="btn btn-primary" id="depositBtn">💰 إيداع</button>
                <button class="btn btn-secondary" id="withdrawBtn">💸 سحب</button>
            </div>
            
            <div class="play-area">
                <div class="game-icon">🎮</div>
                <button class="play-btn" id="playBtn">العب الآن</button>
            </div>
        </div>
        
        <!-- شاشة معلومات الحساب -->
        <div id="accountView" class="hidden">
            <div class="top-bar" style="margin-bottom:20px">
                <div class="account-btn" id="backBtn">←</div>
                <div></div>
            </div>
            <div style="background:#1a1a1a; padding:20px; border-radius:20px; border:1px solid #ff0000">
                <div class="info-row"><span>👤 الاسم:</span><span id="infoName">-</span></div>
                <div class="info-row"><span>🆔 كود الإحالة:</span><span id="infoCode">-</span></div>
                <div class="info-row"><span>💼 أرباح الإحالات:</span><span id="infoEarnings">0 NSP</span></div>
                <div class="info-row"><span>👥 عدد الإحالات:</span><span id="infoCount">0</span></div>
                <div class="referral-code" id="referralCodeDisplay"></div>
                <button class="google-btn" id="logoutBtn" style="margin-top:20px; background:#333;">🚪 تسجيل خروج</button>
            </div>
        </div>
        
        <!-- الشريط السفلي -->
        <div class="bottom-nav">
            <div class="nav-item" data-tab="stats">📊<span class="nav-label">احصائياتي</span></div>
            <div class="nav-item" data-tab="earn">💎<span class="nav-label">اكسب مجانا</span></div>
            <div class="nav-item" data-tab="tasks">📋<span class="nav-label">المهام</span></div>
            <div class="nav-item" data-tab="requests">📝<span class="nav-label">طلباتي</span></div>
        </div>
    </div>
    
    <!-- النوافذ المنبثقة -->
    <div id="statsModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>📊 إحصائياتي</h3><span class="close">×</span></div><div id="statsContent"></div></div></div>
    <div id="earnModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>💎 اكسب مجانا</h3><span class="close">×</span></div><div style="text-align:center;padding:20px"><p>قم بدعوة أصدقائك!</p><div id="earnCode" class="referral-code"></div><p style="margin-top:15px;color:#ff6666">كل دعوة = 5 NSP</p></div></div></div>
    <div id="tasksModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>📋 المهام</h3><span class="close">×</span></div><div><div class="request-item" style="display:flex;justify-content:space-between"><span>✅ متابعة الصفحة</span><button class="btn btn-primary" style="padding:5px 15px">+10</button></div><div class="request-item" style="display:flex;justify-content:space-between"><span>📢 مشاركة الرابط</span><button class="btn btn-primary" style="padding:5px 15px">+5</button></div></div></div></div>
    <div id="requestsModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>📋 آخر طلباتي</h3><span class="close">×</span></div><div id="requestsList"></div></div></div>
    
    <script type="module">
        // تكوين Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCvPo4HlsNhyf1WBmTzIr6CdR1c2lQ5sHU",
            authDomain: "boomb-fa3e7.firebaseapp.com",
            projectId: "boomb-fa3e7",
            storageBucket: "boomb-fa3e7.firebasestorage.app",
            messagingSenderId: "499624996530",
            appId: "1:499624996530:web:235f71e450845c748523ab"
        };
        
        // استيراد Firebase
        const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js");
        const { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js");
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        
        // متغيرات
        let currentUser = null;
        let userData = null;
        const API_URL = "https://ass-yygm.onrender.com"; // للتشغيل على Render، اتركها هكذا. للتشغيل المحلي: "http://localhost:3001"
        
        // دوال مساعدة
        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = isError ? '#cc0000' : '#00cc00';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        async function callAPI(endpoint, options = {}) {
            const token = await auth.currentUser?.getIdToken();
            const res = await fetch(`${API_URL}${endpoint}`, {
                ...options,
                headers: {
                    'Content-Type': 'application/json',
                    ...(token && { 'Authorization': `Bearer ${token}` }),
                    ...options.headers
                }
            });
            if (res.status === 401) {
                showToast('انتهت الجلسة، سجل دخول مرة أخرى', true);
                await signOut(auth);
                return null;
            }
            return res;
        }
        
        async function loadProfile() {
            const res = await callAPI('/api/user/profile');
            if (res) {
                const data = await res.json();
                if (data.success) {
                    userData = data.user;
                    document.getElementById('balanceAmount').textContent = userData.balance || 0;
                    document.getElementById('infoName').textContent = userData.name || currentUser?.displayName;
                }
            }
        }
        
        async function loadStats() {
            const res = await callAPI('/api/user/stats');
            if (res) {
                const data = await res.json();
                if (data.success) {
                    document.getElementById('infoCode').textContent = data.stats.uniqueId;
                    document.getElementById('infoEarnings').textContent = data.stats.totalReferralEarnings + ' NSP';
                    document.getElementById('infoCount').textContent = data.stats.referralCount;
                    document.getElementById('referralCodeDisplay').innerHTML = `🔗 كود الإحالة: ${data.stats.uniqueId}`;
                    document.getElementById('earnCode').innerHTML = `كودك: ${data.stats.uniqueId}`;
                    document.getElementById('statsContent').innerHTML = `
                        <div class="info-row"><span>📅 تاريخ التسجيل:</span><span>${data.stats.joinDate ? new Date(data.stats.joinDate).toLocaleDateString('ar') : '-'}</span></div>
                        <div class="info-row"><span>👥 عدد الإحالات:</span><span>${data.stats.referralCount}</span></div>
                        <div class="info-row"><span>💰 أرباح الإحالات:</span><span>${data.stats.totalReferralEarnings} NSP</span></div>
                        <div class="info-row"><span>💎 رصيد NSP:</span><span>${data.stats.balance} NSP</span></div>
                    `;
                }
            }
        }
        
        async function loadRequests() {
            const res = await callAPI('/api/user/requests');
            if (res) {
                const data = await res.json();
                if (data.success && data.requests) {
                    const container = document.getElementById('requestsList');
                    if (data.requests.length === 0) {
                        container.innerHTML = '<p style="text-align:center">لا توجد طلبات</p>';
                    } else {
                        container.innerHTML = data.requests.map(req => `
                            <div class="request-item">
                                <div><strong>${req.type === 'deposit' ? '💰 إيداع' : '💸 سحب'}</strong></div>
                                <div>المبلغ: ${req.amount} NSP</div>
                                <div>الحالة: ${req.status === 'pending' ? '⏳ قيد المراجعة' : req.status === 'approved' ? '✅ مقبول' : '❌ مرفوض'}</div>
                                <div>التاريخ: ${req.createdAt ? new Date(req.createdAt).toLocaleString('ar') : '-'}</div>
                            </div>
                        `).join('');
                    }
                }
            }
        }
        
        async function registerUser(referrerId = null) {
            const res = await callAPI('/api/user/register', {
                method: 'POST',
                body: JSON.stringify({ referrerId })
            });
            if (res) {
                const data = await res.json();
                if (data.success) {
                    userData = data.user;
                    await loadStats();
                }
            }
        }
        
        async function createRequest(type, amount) {
            const res = await callAPI('/api/user/create-request', {
                method: 'POST',
                body: JSON.stringify({ type, amount: Number(amount) })
            });
            const data = await res.json();
            if (res.status === 429) {
                showToast(data.error, true);
            } else if (data.success) {
                showToast(`تم إنشاء طلب ${type === 'deposit' ? 'إيداع' : 'سحب'} بنجاح`);
            } else {
                showToast(data.error || 'حدث خطأ', true);
            }
        }
        
        // منع التكرار على الأزرار
        let lastClick = 0;
        function preventDouble(fn) {
            const now = Date.now();
            if (now - lastClick > 1000) {
                lastClick = now;
                fn();
            } else {
                showToast('الرجاء الانتظار ثانية', true);
            }
        }
        
        // التعامل مع تسجيل الدخول
        async function handleGoogleSignIn() {
            try {
                const result = await signInWithPopup(auth, provider);
                currentUser = result.user;
                const urlParams = new URLSearchParams(window.location.search);
                const referrerId = urlParams.get('ref');
                await registerUser(referrerId);
                await loadProfile();
                await loadStats();
                document.getElementById('loading').style.display = 'none';
                document.getElementById('app').classList.remove('hidden');
            } catch (error) {
                showToast('فشل تسجيل الدخول', true);
            }
        }
        
        // مراقبة حالة الدخول
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                await registerUser();
                await loadProfile();
                await loadStats();
                document.getElementById('loading').style.display = 'none';
                document.getElementById('app').classList.remove('hidden');
            } else {
                document.getElementById('loading').innerHTML = '<button class="google-btn" id="loginBtn">🔐 تسجيل دخول Google</button>';
                document.getElementById('loading').style.display = 'flex';
                document.getElementById('app').classList.add('hidden');
                document.getElementById('loginBtn')?.addEventListener('click', handleGoogleSignIn);
            }
        });
        
        // أحداث الواجهة
        document.getElementById('accountBtn').onclick = () => {
            document.getElementById('mainView').classList.add('hidden');
            document.getElementById('accountView').classList.remove('hidden');
        };
        document.getElementById('backBtn').onclick = () => {
            document.getElementById('accountView').classList.add('hidden');
            document.getElementById('mainView').classList.remove('hidden');
        };
        document.getElementById('depositBtn').onclick = () => preventDouble(() => {
            const amount = prompt('مبلغ الإيداع:');
            if (amount && amount > 0) createRequest('deposit', amount);
        });
        document.getElementById('withdrawBtn').onclick = () => preventDouble(() => {
            const amount = prompt('مبلغ السحب:');
            if (amount && amount > 0) {
                if (userData && amount > userData.balance) showToast('الرصيد غير كاف', true);
                else createRequest('withdraw', amount);
            }
        });
        document.getElementById('playBtn').onclick = () => showToast('🎮 جارٍ تطوير اللعبة قريباً');
        document.getElementById('logoutBtn').onclick = async () => { await signOut(auth); location.reload(); };
        
        // النوافذ المنبثقة
        const modals = {
            stats: document.getElementById('statsModal'),
            earn: document.getElementById('earnModal'),
            tasks: document.getElementById('tasksModal'),
            requests: document.getElementById('requestsModal')
        };
        document.querySelectorAll('.nav-item').forEach(item => {
            item.onclick = async () => {
                const tab = item.getAttribute('data-tab');
                if (tab === 'requests') await loadRequests();
                if (modals[tab]) modals[tab].style.display = 'flex';
            };
        });
        Object.values(modals).forEach(modal => {
            if (modal) {
                modal.querySelector('.close').onclick = () => modal.style.display = 'none';
                modal.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };
            }
        });
    </script>
</body>
</html>
